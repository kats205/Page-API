global:
  resolve_timeout: 5m

route:
  receiver: "null"
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: "discord-notifications"
      group_wait: 0s

receivers:
  - name: "null"
  - name: "discord-notifications"
    discord_configs:
      - webhook_url: "YOUR_DISCORD_WEBHOOK_URL"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"
        message: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
