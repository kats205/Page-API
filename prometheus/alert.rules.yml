groups:
  - name: kafka_alerts
    rules:
      - alert: DeadLetterQueueReceived
        expr: increase(kafka_topic_partition_current_offset{topic="dead_letter"}[1m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Message entered Dead Letter Queue"
          description: "Topic dead_letter received a new message. Check Kafka UI at http://localhost:8080."

      - alert: KafkaConsumerLagHigh
        expr: kafka_consumergroup_lag > 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group {{ $labels.consumergroup }} is lagging on topic {{ $labels.topic }}."

      - alert: WebhookReceiverSilent
        expr: increase(kafka_topic_partition_current_offset{topic="raw_events"}[5m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No raw_events received recently"
          description: "Check Facebook webhook subscription, ngrok URL, and webhook-service logs."
